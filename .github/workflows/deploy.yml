name: Deploy to GitHub Pages

# IMPORTANT: This workflow ONLY deploys from the main/master branch
# This ensures only production-ready code is deployed to GitHub Pages
on:
  push:
    branches:
      - main
      - master  # Fallback if repository uses master instead of main
  workflow_dispatch:  # Allows manual deployment from GitHub UI (still respects branch protection)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Only run if branch is main or master
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify branch
        run: |
          echo "Deploying from branch: ${GITHUB_REF#refs/heads/}"
          if [[ "${GITHUB_REF#refs/heads/}" != "main" && "${GITHUB_REF#refs/heads/}" != "master" ]]; then
            echo "ERROR: Deployment only allowed from main or master branch"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
